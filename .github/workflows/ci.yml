name: Fairness CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Start API
      run: |
        uvicorn app.main:app --host 127.0.0.1 --port 8000 &
    
    - name: Wait for API
      run: sleep 5

    - name: Run fairness test
      run: |
        python tests/fairness_test.py